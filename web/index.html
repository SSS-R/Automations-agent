<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Clipper Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="scissors" class="logo-icon"></i>
                <h2>Auto-Clipper</h2>
            </div>
            
            <div class="sidebar-nav">
                <h3>Parsed Videos</h3>
                <ul id="video-list" class="video-list">
                    <!-- JS injects here -->
                    <div class="loader-small" id="sidebar-loader"></div>
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <a href="https://studio.youtube.com" target="_blank" class="quick-link">
                    <i data-lucide="youtube"></i> YT Studio
                </a>
                <a href="https://www.tiktok.com/creator-center/upload" target="_blank" class="quick-link">
                    <i data-lucide="video"></i> TikTok
                </a>
                <a href="https://www.instagram.com" target="_blank" class="quick-link">
                    <i data-lucide="instagram"></i> Instagram
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 id="current-video-title">Select a video to view clips</h1>
                <div class="topbar-stats" id="current-video-stats"></div>
            </header>
            
            <div class="clips-container" id="clips-grid">
                <!-- JS injects clips here -->
            </div>
        </main>
        
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">Copied to clipboard!</div>

    <script src="app.js"></script>
</body>
</html>
